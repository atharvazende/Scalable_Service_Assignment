apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
      - name: catalog-service
        image: eci-catalog-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: eci-config
              key: POSTGRES_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: eci-secret
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: postgresql://$(DB_USER):$(DB_PASS)@postgres:5432/catalog_db
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: 64Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  type: NodePort
  selector:
    app: catalog-service
  ports:
  - port: 8001
    targetPort: 8001
    nodePort: 30001
---
