    static_configs:
      - targets: ['catalog_service:8001']
  - job_name: 'inventory_service'
    static_configs:
      - targets: ['inventory_service:8002']
  - job_name: 'order_service'
    static_configs:
      - targets: ['order_service:8003']
  - job_name: 'payment_service'
    static_configs:
      - targets: ['payment_service:8004']
  - job_name: 'shipping_service'
    static_configs:
      - targets: ['shipping_service:8005']
  - job_name: 'notification_service'
    static_configs:
      - targets: ['notification_service:8006']
